name: Sync field-modifier counts

# Keep the "Supported Field Modifiers" tables in the docs in sync with the
# upstream auto-generated source in the hayabusa-rules repo
# (doc/SupportedSigmaFieldModifiers.md), which is regenerated whenever the Sigma
# or Hayabusa rulesets change. Runs monthly (and on demand); when the counts
# change it opens a pull request against main so the protected-branch rules are
# respected. The docs deploy triggers automatically when the PR is merged.

on:
  schedule:
    - cron: "0 23 1 * *" # monthly, at 23:00 UTC on the 1st (use workflow_dispatch for an ad-hoc sync)
  workflow_dispatch:

permissions:
  contents: write      # push the sync branch
  pull-requests: write # open pull requests

concurrency:
  group: sync-field-modifiers
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Sync field-modifier tables from hayabusa-rules
        run: python website/scripts/sync_field_modifiers.py

      - name: Commit changes and open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain website/docs/rules/field-modifiers*.md)" ]; then
            echo "Field-modifier tables are already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/sync-field-modifiers-$(date +%Y%m%d)"
          # Skip if today's sync branch already exists on origin (re-run safety).
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Sync branch ${BRANCH} already exists; skipping."
            exit 0
          fi
          git checkout -b "${BRANCH}"
          git add website/docs/rules/field-modifiers*.md
          git commit -m "docs: sync field-modifier counts from hayabusa-rules"
          git push origin "${BRANCH}"
          gh pr create \
            --title "docs: sync field-modifier counts from hayabusa-rules" \
            --body "Automated sync of field-modifier counts from hayabusa-rules." \
            --base main \
            --head "${BRANCH}"
